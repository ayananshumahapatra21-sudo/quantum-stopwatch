<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Stopwatch - Premium Time Tracker</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

<div class="glass-bg-decorations">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
</div>

<div class="app-container">
    <!-- Header with controls -->
    <header class="app-header">
        <div class="app-title-group">
            <span class="logo-icon">⏱️</span>
            <h1>Quantum Stopwatch</h1>
        </div>
        <div class="header-actions">
            <!-- Audio Toggle Button -->
            <button id="audio-toggle" class="icon-btn" aria-label="Toggle sound" title="Toggle Sound (Mute/Unmute)">
                <svg id="sound-on-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-volume-2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <svg id="sound-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-volume-x hidden"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
            </button>
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle Light/Dark Theme">
                <!-- Sun Icon -->
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sun hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <!-- Moon Icon -->
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </header>

    <!-- Main Visual Timer Dial -->
    <main class="timer-section">
        <div class="radial-timer-container">
            <!-- SVG Progress Ring -->
            <svg class="progress-ring" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--gradient-start)" />
                        <stop offset="100%" stop-color="var(--gradient-end)" />
                    </linearGradient>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="6" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>
                <!-- Track Circle -->
                <circle class="progress-ring-track" cx="100" cy="100" r="88" />
                <!-- Active Dial Circle -->
                <circle id="progress-ring-bar" class="progress-ring-bar" cx="100" cy="100" r="88" transform="rotate(-90 100 100)" />
            </svg>

            <!-- Digital Display inside Circle -->
            <div class="display-content">
                <div class="time-label" id="timer-state-label">READY</div>
                <div id="display" class="timer-digits">
                    <span class="digit-group" id="hours">00</span><span class="colon">:</span><span class="digit-group" id="minutes">00</span><span class="colon">:</span><span class="digit-group" id="seconds">00</span><span class="dot">.</span><span class="digit-group ms" id="milliseconds">000</span>
                </div>
                <div class="current-lap-indicator" id="current-lap-time">Lap 1: 00:00:00.000</div>
            </div>
        </div>
    </main>

    <!-- Contextual Control Actions -->
    <section class="controls-section">
        <div class="buttons-grid">
            <button id="btn-reset" class="control-btn secondary disabled" disabled title="Reset (R)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                <span>Reset</span>
            </button>
            
            <button id="btn-primary" class="control-btn primary" title="Start (Space)">
                <span class="btn-icon-wrapper">
                    <!-- Play icon -->
                    <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Pause icon -->
                    <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </span>
                <span id="btn-primary-text">Start</span>
            </button>
            
            <button id="btn-lap" class="control-btn secondary disabled" disabled title="Record Lap (L)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span>Lap</span>
            </button>
        </div>
    </section>

    <!-- Lap Stats and Records Dashboard -->
    <section class="laps-dashboard-section hidden" id="laps-dashboard">
        <!-- Live Statistics Panel -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total-laps">0</div>
                <div class="stat-label">Total Laps</div>
            </div>
            <div class="stat-card highlight-green">
                <div class="stat-value" id="stat-best-lap">--:--.--</div>
                <div class="stat-label">⚡ Best Lap</div>
            </div>
            <div class="stat-card highlight-red">
                <div class="stat-value" id="stat-worst-lap">--:--.--</div>
                <div class="stat-label">🐢 Slowest Lap</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-avg-lap">--:--.--</div>
                <div class="stat-label">Ø Average</div>
            </div>
        </div>

        <!-- Lap History Header -->
        <div class="laps-header">
            <h3>Lap Splits</h3>
            <button id="btn-export" class="text-btn" title="Export lap times as text file">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Export
            </button>
        </div>

        <!-- Laps List -->
        <div class="laps-list-wrapper">
            <ul id="laps"></ul>
        </div>
    </section>

    <!-- Footer / Keyboard Shortcuts Guide -->
    <footer class="app-footer">
        <div class="shortcuts-guide">
            <span class="key">Space</span> toggle start/pause &bull; 
            <span class="key">L</span> record lap &bull; 
            <span class="key">R</span> reset
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
